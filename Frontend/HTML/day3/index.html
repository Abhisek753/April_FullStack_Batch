  <body>
    <h1>Multimedia tags and form concepts</h1>
    <video width="320" height="240" controls>
      <source src="htmvideos.mp4" type="video/mp4" />
      <source src="htmvideos.mp4" type="video/mp4" />

    </video>

    <audio controls>
      <source src="horse.ogv" type="audio/ogg" />
      <source src="horse.mp3" type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <br />
    <h2>Form Tags and attributes</h2>
    <form>
        <label for="user">Username</label>
       <input id="user" required placeholder="Enter Your Name" type="text"/>   <br />
        <label for="number">User Number</label>
       <input id="number" required placeholder="Enter Your Number" type="number"/>   <br />
        <label for="email">User Email</label>

       <input id="email" required placeholder="Enter Your Email" type="email"/>   <br />
       <label for="password">Password</label>
       <input id="password" placeholder="Enter Your Password" type="password" />   <br />
       <select>
          <option >Select Gender</option>
           <option  value="male">Male</option>
            <option value="female">Female</option>
             <option value="trans"> Trans</option>
       </select><br/>
       <input type="checkbox" name="check" value="art">Art
        <input type="checkbox" name="check" value="music">Music
        <input type="checkbox" name="check" value="sports">Sports
        <input type="checkbox" name="check" value="chess">Chess
        <br>
        <label for="yes">Yes</label>
          <input id="yes" type="radio" name="active" value="1">
          <br/>
           <label for="no">No</label>
        <input id="no" type="radio" name="active" value="0">
       
       <input type="submit"/>
    </form>
